services:
  redis:
    image: redis:alpine
    container_name: taskzenflow_redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - '6379:6379'
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf
      - redis_data:/data
    networks:
      - redis_network

networks:
  redis_network:
    driver: bridge

volumes:
  redis_data:
