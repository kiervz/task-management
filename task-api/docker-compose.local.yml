services:
  # Laravel App
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.local
    container_name: taskzenflow_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor # exclude vendor from bind mount for performance
    environment:
      - PHP_OPCACHE_ENABLE=0 # disable opcache in local dev
    networks:
      - taskzenflow
    depends_on:
      mysql:
        condition: service_healthy
      redis_queue:
        condition: service_healthy

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: taskzenflow_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.local.conf:/etc/nginx/conf.d/default.conf
    networks:
      - taskzenflow
    depends_on:
      - app

  # MySQL
  mysql:
    image: mysql:8.0
    container_name: taskzenflow_mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-taskzenflow}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-taskzenflow}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - taskzenflow_mysql_data:/var/lib/mysql
    networks:
      - taskzenflow
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${DB_ROOT_PASSWORD:-root}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Queue)
  redis_queue:
    image: redis:alpine
    container_name: taskzenflow_redis_queue
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - taskzenflow_redis_queue_data:/data
    networks:
      - taskzenflow
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Queue Worker
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.local
    container_name: taskzenflow_queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    networks:
      - taskzenflow
    depends_on:
      mysql:
        condition: service_healthy
      redis_queue:
        condition: service_healthy

  # Mailpit
  mailpit:
    image: axllent/mailpit:latest
    container_name: taskzenflow_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    networks:
      - taskzenflow

  # Scheduler
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.local
    container_name: taskzenflow_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan schedule:work
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    networks:
      - taskzenflow
    depends_on:
      mysql:
        condition: service_healthy
      redis_queue:
        condition: service_healthy

volumes:
  taskzenflow_mysql_data:
  taskzenflow_redis_queue_data:

networks:
  taskzenflow:
    driver: bridge
