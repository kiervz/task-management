services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: taskzenflow_app
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      APP_ENV: production
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    container_name: taskzenflow_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
