services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.local
    container_name: taskzenflow_web
    restart: unless-stopped
    ports:
      - '5173:5173'
    volumes:
      - .:/app
      - /app/node_modules # exclude node_modules from bind mount for performance
    environment:
      - NODE_ENV=development
    networks:
      - taskzenflow_web

networks:
  taskzenflow_web:
    driver: bridge
