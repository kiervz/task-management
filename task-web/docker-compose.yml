services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: taskzenflow_api
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - taskzenflow

  nginx:
    image: nginx:alpine
    container_name: taskzenflow_nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - taskzenflow

networks:
  taskzenflow:
    driver: bridge
